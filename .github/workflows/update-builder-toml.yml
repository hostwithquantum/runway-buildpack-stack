name: Update builder.toml and Send Pull Request

on:
  schedule:
  - cron: '36 0,12 * * *' # daily at 00:36 and 12:36 UTC
  workflow_dispatch: {}

permissions: {}

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        ubuntu:
          - jammy
          - noble
    concurrency: builder_update-${{ matrix.ubuntu }}
    name: Update builders/${{ matrix.ubuntu }}/builder.toml
    runs-on: ubuntu-22.04
    env:
      BRANCH: "automation/${{ matrix.ubuntu }}/builder-toml"
    steps:
    - id: token
      uses: hostwithquantum/setup-gh-token@v1.0.1
      with:
        client-id: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
        private-key: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
    - uses: actions/checkout@v6
      with:
        token: ${{ steps.token.outputs.token }}
        persist-credentials: true

    - name: Checkout branch
      uses: paketo-buildpacks/github-config/actions/pull-request/checkout-branch@main
      with:
        branch: ${{ env.BRANCH }}

    - uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_REGISTRY_USERNAME }}
        password: ${{ secrets.DOCKERHUB_REGISTRY_PASSWORD }}

    - name: Update builder.toml
      uses: paketo-buildpacks/github-config/actions/builder/update@main
      with:
        filename: builders/${{ matrix.ubuntu }}/builder.toml
        token: ${{ steps.token.outputs.token }}

    - name: Git commit
      id: commit
      uses: paketo-buildpacks/github-config/actions/pull-request/create-commit@main
      with:
        message: "feat(builders): update builder.toml for ${{ matrix.ubuntu }}"
        pathspec: "builders/${{ matrix.ubuntu }}/builder.toml"
        committer_name: ${{ steps.token.outputs.committer-name }}
        committer_email: ${{ steps.token.outputs.committer-email }}

    - name: Git push
      if: ${{ steps.commit.outputs.commit_sha != '' }}
      uses: paketo-buildpacks/github-config/actions/pull-request/push-branch@main
      with:
        branch: ${{ env.BRANCH }}

    - name: Open Pull Request
      if: ${{ steps.commit.outputs.commit_sha != '' }}
      uses: paketo-buildpacks/github-config/actions/pull-request/open@main
      with:
        token: ${{ steps.token.outputs.token }}
        title: "Updating ${{ matrix.ubuntu }}/builder.toml"
        branch: ${{ env.BRANCH }}
