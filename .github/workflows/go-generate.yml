name: go-generate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - id: load-registry-credentials
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_RUNWAYOSS_SERVICE_ACCOUNT }}
          REGISTRY_USERNAME: op://RunwayOSS/robot-harbor-buildpacks/username
          REGISTRY_PASSWORD: op://RunwayOSS/robot-harbor-buildpacks/password
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: warjiang/setup-skopeo@v0.1.3
      - run: |
          skopeo login \
          --username ${REGISTRY_USERNAME} \
          --password ${REGISTRY_PASSWORD} \
          r.planetary-quantum.com
        env:
          REGISTRY_USERNAME: ${{ steps.load-registry-credentials.outputs.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ steps.load-registry-credentials.outputs.REGISTRY_PASSWORD }}
      - id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/tools/release.sh
      - uses: paketo-buildpacks/github-config/actions/release/download-asset@main
        with:
          url: ${{ steps.info.outputs.download_url }}
          output: "/github/workspace/buildpackage.cnb"
          token: ${{ secrets.GITHUB_TOKEN }}
      - env:
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          sudo skopeo copy \
            "oci-archive:${GITHUB_WORKSPACE}/buildpackage.cnb" \
            docker://r.planetary-quantum.com/buildpacks/go-generate:${VERSION}
