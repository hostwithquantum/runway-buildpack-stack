name: publish-meta

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'meta/**'


permissions: {}

jobs:
  meta:
    permissions:
      contents: read
    strategy:
      matrix:
        buildpack:
          - dotnet-core
          - go
          - java
          - java-native-image
          - nodejs
          - php
          - python
          - ruby
          - runway
    runs-on: ubuntu-latest
    env:
      IMAGE: r.planetary-quantum.com/buildpacks/${{ matrix.buildpack }}
    steps:
      - id: load-registry-credentials
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_RUNWAYOSS_SERVICE_ACCOUNT }}
          REGISTRY_USERNAME: op://RunwayOSS/robot-harbor-buildpacks/username
          REGISTRY_PASSWORD: op://RunwayOSS/robot-harbor-buildpacks/password
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: buildpacks/github-actions/setup-pack@v5.12.1
      - run: pack config experimental true
      - uses: warjiang/setup-skopeo@v0.1.3
      - uses: SebRollen/toml-action@v1.2.0
        id: version
        with:
          file: 'meta/${{ matrix.buildpack }}/buildpack.toml'
          field: 'buildpack.version'
      - name: check if the image exists
        id: exists
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set +e
          skopeo inspect ${IMAGE}:${VERSION}
          if [ $? -ne 0 ]; then
            echo "status=publish" >> $GITHUB_OUTPUT
          else
            echo "status=stop" >> $GITHUB_OUTPUT
          fi
          exit 0
      - if: ${{ steps.exists.outputs.status == 'stop' }}
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          echo "### no updates" >> $GITHUB_STEP_SUMMARY
          echo "An image (version: ${VERSION}) already exists." >> $GITHUB_STEP_SUMMARY
          echo "Please update version, when necessary!" >> $GITHUB_STEP_SUMMARY
      - if: ${{ steps.exists.outputs.status == 'publish' }}
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          echo "### updates :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "found new release: ${VERSION}" >> $GITHUB_STEP_SUMMARY
      - if: ${{ steps.exists.outputs.status == 'publish' }}
        name: build
        run: >
          pack -v buildpack package ${{ matrix.buildpack }}
          --config meta/${{ matrix.buildpack }}/package.toml
          --format file
          --flatten
          --pull-policy if-not-present
      - if: ${{ steps.exists.outputs.status == 'publish' }}
        run: |
          skopeo login \
            --username ${REGISTRY_USERNAME} \
            --password ${REGISTRY_PASSWORD} \
            r.planetary-quantum.com
        env:
          REGISTRY_USERNAME: ${{ steps.load-registry-credentials.outputs.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ steps.load-registry-credentials.outputs.REGISTRY_PASSWORD }}
      - if: ${{ steps.exists.outputs.status == 'publish' }}
        name: "publish meta/${{ matrix.buildpack }}"
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          sudo skopeo copy \
            oci-archive:${{ matrix.buildpack }}.cnb \
            docker://${IMAGE}:${VERSION}
