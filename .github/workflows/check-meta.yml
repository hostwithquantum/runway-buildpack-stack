name: meta

on:
  pull_request:
    paths:
      - 'meta/**'
      - 'Makefile'
      - '.github/workflows/check-meta.yml'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        buildpack: [dotnet-core, go, java, java-native-image, nodejs, php, python, ruby, runway]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: buildpacks/github-actions/setup-pack@v5.12.1
      - run: pack config experimental true
      - run: make meta/${{ matrix.buildpack }}/buildpack.cnb