name: Release

on:
  pull_request:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  runimage:
    permissions:
      contents: read
    strategy:
      matrix:
        ubuntu:
          - jammy
          - noble
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          r.planetary-quantum.com/runway-public/runway-runimage
        flavor: |
          latest=false
        tags: |
          type=semver,prefix=${{ matrix.ubuntu }}-full-,pattern={{version}}
          type=raw,value=${{ matrix.ubuntu }}-full,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          type=ref,event=pr,prefix=${{ matrix.ubuntu }}-full-pr-

    - uses: docker/login-action@v4
      with:
        registry: r.planetary-quantum.com
        username: ${{ secrets.QUANTUM_REGISTRY_USERNAME }}
        password: ${{ secrets.QUANTUM_REGISTRY_PASSWORD }}
    - uses: docker/setup-buildx-action@v4
    - uses: docker/build-push-action@v7
      with:
        context: builders/${{ matrix.ubuntu }}/runimage
        platforms: linux/amd64,linux/arm64
        cache-from: r.planetary-quantum.com/runway-public/runway-runimage:${{ matrix.ubuntu }}-full
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  builder:
    needs: [runimage]
    permissions:
      contents: read
    strategy:
      matrix:
        ubuntu:
          - jammy
          - noble
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          r.planetary-quantum.com/runway-public/runway-buildpack-stack
        flavor: |
          latest=false
        tags: |
          type=semver,prefix=${{ matrix.ubuntu }}-full-,pattern={{version}}
          type=raw,value=${{ matrix.ubuntu }}-full,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          type=ref,event=pr,prefix=${{ matrix.ubuntu }}-full-pr-

    - uses: buildpacks/github-actions/setup-pack@v5.12.0

    - uses: docker/login-action@v4
      with:
        registry: r.planetary-quantum.com
        username: ${{ secrets.QUANTUM_REGISTRY_USERNAME }}
        password: ${{ secrets.QUANTUM_REGISTRY_PASSWORD }}
    - uses: docker/setup-buildx-action@v4

    - id: tag
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        PRIMARY_TAG=$(echo "${TAGS}" | head -n1)
        echo "primary=${PRIMARY_TAG}" >> $GITHUB_OUTPUT
        echo "Building: ${PRIMARY_TAG}" >> $GITHUB_STEP_SUMMARY

    - name: Create Builder Image
      env:
        PRIMARY: ${{ steps.tag.outputs.primary }}
      run: |
        make build-builder \
          BUILDER_BASE=${{ matrix.ubuntu }} \
          PUBLISH_TAG="${PRIMARY}"

    - env:
        PRIMARY: ${{ steps.tag.outputs.primary }}
      run: |
        docker pull ${PRIMARY}

    # the actual layer limit is 127, let's relax this so we can work on improving this situation
    # without failing our builds
    - env:
        PRIMARY: ${{ steps.tag.outputs.primary }}
      run: |
        LAYER_COUNT=$(docker image inspect "${PRIMARY}" | jq '.[].RootFS.Layers | length')
        if [ "$LAYER_COUNT" -gt "120" ]; then
          echo "Too many layers: $LAYER_COUNT (limit: 120)"
          exit 1
        fi
        echo "## Layer Count (flattened)" >> $GITHUB_STEP_SUMMARY
        echo "${LAYER_COUNT} layers" >> $GITHUB_STEP_SUMMARY

    - name: Tag additional tags
      if: startsWith(github.ref, 'refs/tags/')
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        PRIMARY_TAG=$(echo "$TAGS" | head -n1)
        echo "$TAGS" | tail -n+2 | while read -r tag; do
          docker tag "$PRIMARY_TAG" "$tag"
          docker push "$tag"
        done

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [runimage, builder]
    runs-on: ubuntu-latest
    steps:
    - id: generate-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
        private-key: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
    - env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        gh release create \
          "${GITHUB_REF_NAME}" \
          --generate-notes \
          --repo "${GITHUB_REPOSITORY}"

  docs:
    needs: [release]
    uses: ./.github/workflows/docs.yml
    secrets:
      RUNWAY_CI_BOT_APP_ID: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
      RUNWAY_CI_BOT_PRIVATE_KEY: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
      WWW_REPO: ${{ secrets.WWW_REPO }}

