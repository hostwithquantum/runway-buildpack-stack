version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/scripts/generate-buildpack-docs"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      go:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directories:
      - "/builders/jammy/runimage"
      - "/builders/noble/runimage"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 1
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    groups:
      actions-deps:
        patterns:
          - "*"